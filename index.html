<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple E-commerce</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f5f5f5;
      }

      header {
        background: #222;
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        padding: 20px;
      }

      .product {
        background: white;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .product img {
        width: 100%;
        height: 150px;
        object-fit: cover;
      }

      button {
        background: #007bff;
        color: white;
        border: none;
        padding: 10px;
        margin-top: 10px;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background: #0056b3;
      }

      .cart {
        padding: 20px;
        background: white;
        margin: 20px;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <header>
      <h2>Tarun Shop</h2>
      <h3>Cart: <span id="cart-count">0</span></h3>
    </header>

    <div class="container" id="products"></div>

    <div class="cart">
      <h3>Cart Items</h3>
      <ul id="cart-items"></ul>
    </div>

    <script>
      const products = [
        {
          id: 1,
          name: "Headphones",
          price: 1200,
          img: "images/headphones.png",
        },
        {
          id: 2,
          name: "Keyboard",
          price: 900,
          img: "images/keyboard.png",
        },
        {
          id: 3,
          name: "Mouse",
          price: 500,
          img: "images/mouse.png",
        },
        {
          id: 4,
          name: "Monitor",
          price: 8000,
          img: "images/monitor.png",
        },
        {
          id: 5,
          name: "Laptop Stand",
          price: 700,
          img: "images/laptop_stand.png",
        },
        {
          id: 6,
          name: "USB Hub",
          price: 450,
          img: "images/usb_hub.png",
        },
        {
          id: 7,
          name: "Webcam",
          price: 1500,
          img: "images/webcam.png",
        },
        {
          id: 8,
          name: "Speaker",
          price: 2000,
          img: "images/speaker.png",
        },
        { id: 9, name: "SSD", price: 3500, img: "images/ssd.png" },
        {
          id: 10,
          name: "Gaming Chair",
          price: 9500,
          img: "images/gaming_chair.png",
        },
      ];

      const productContainer = document.getElementById("products");
      const cartItems = document.getElementById("cart-items");
      const cartCount = document.getElementById("cart-count");

      let cart = [];

      function renderProducts() {
        products.forEach((p) => {
          const div = document.createElement("div");
          div.className = "product";

          div.innerHTML = `
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
        `;

          productContainer.appendChild(div);
        });
      }

      function addToCart(id) {
        const product = products.find((p) => p.id === id);
        cart.push(product);

        updateCart();
      }

      function updateCart() {
        cartItems.innerHTML = "";

        cart.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item.name + " - ₹" + item.price;
          cartItems.appendChild(li);
        });

        cartCount.textContent = cart.length;
      }

      renderProducts();
    </script>
  </body>
</html>
